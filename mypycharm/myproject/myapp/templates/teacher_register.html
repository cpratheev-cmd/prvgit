<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Teacher Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
<link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
<style>
  body {
    margin: 0;
    height: 100vh;
    background-image: url("{% static 'back.png' %}");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
  }

  .box {
    background: rgba(0,0,0,0.75);
    padding: 35px;
    width: 370px;
    border-radius: 18px;
    color: white;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,0,0,0.8);
  }

  /* Register title center */
  .box h2 {
    text-align: center;
    color: orange;
    margin-bottom: 20px;
    width: 100%;
  }

  /* Header layout */
  .box div {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  /* Logout icon right corner */
  .box div a {
    position: absolute;
    right: 0;
    color: white;
    font-size: 22px;
    padding: 6px 10px;
    border-radius: 8px;
    transition: 0.3s;
    background: rgba(255,255,255,0.1);
  }

  .box div a:hover {
    color: #ff4d4d;
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 10px red;
    transform: scale(1.2);
  }

  .box label {
    font-size: 15px;
    display: block;
    margin-top: 12px;
  }

  .box input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
  }

  .box input:hover {
    box-shadow: 0 0 10px #00aaff;
  }

  .box button {
    width: 100%;
    margin-top: 22px;
    padding: 11px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg,#ff8c00,#ff5e00);
    color: white;
    font-size: 18px;
    cursor: pointer;
  }

  .box button:hover {
    box-shadow: 0 0 15px orange;
  }
</style>
</head>

<body>

  <form method="post" action="{% url 'teacher_register' %}" class="box">
    {% csrf_token %}
<div>
    <h2>Register</h2>
      <a href="{% url  'new' %}">
<i class="bi bi-box-arrow-right"></i></a>
</div>
    <label>Teacher ID</label>
    <input type="text" name="t1" placeholder="Enter your Id" required autofocus>

    <label>Password</label>
    <input type="password" name="t2" placeholder="Enter password  eg:teacher" required>

    <label>Department</label>
    <input type="text" name="t3" placeholder="Enter your department  eg:
    Computer Science" required>


  <label>Email</label>
  <input type="email" name="t4" placeholder="Enter your Email" required>

    <button type="submit"><i class="bi bi-save"></i>&nbsp;Save</button>
  </form>
</body>
</html>
