<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <title>Teacher Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url("{% static 'bg8.jpg' %}") no-repeat center/cover;
        }

        .header {
            background: linear-gradient(90deg, #0d6efd, #6610f2);
            color: white;
            padding: 20px;
            text-align: center;
            letter-spacing: 1px;
        }

        .info-box {
            max-width: 900px;
            margin: 30px auto;
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #typingText {
            font-size: 26px;
            font-weight: 600;
            color: #dc3545;
        }

        .box {
            width: 420px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
        }

        .box h2 {
            margin-bottom: 25px;
            font-weight: 700;
        }

        .box a {
            display: block;
            margin: 15px 0;
            padding: 12px;
            background: #0d6efd;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .box a:hover {
            background: #084298;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .back-btn {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h3>SMART STUDENT DROPOUT PREDICTION</h3>
    </div>

    <div class="info-box">
        <h4 class="text-primary mb-3">Important Fact</h4>
        <p id="typingText"></p>
    </div>
    <div class="box">
        <h2>Teacher Dashboard</h2>
        <a href="{% url 'input' %}">
            <i class="bi bi-person-add"></i> Add Student
        </a>

        <a href="{% url 'student:view_students' %}">
            <i class="bi bi-eye-fill"></i> View Students
        </a>

        <a href="{% url 'student:alert_dashboard' %}">Email Notifications</a>
        <a class="btn btn-outline-danger back-btn" href="{% url 'new' %}">
            Back
        </a>
    </div>
    <script>
        const text = "Every Student Matters—Guide Them Toward Success, Not Dropout";
        let index = 0;
        const speed = 100;

        function typeEffect() {
            if (index < text.length) {
                document.getElementById("typingText").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeEffect, speed);
            }
        }
        window.onload = typeEffect;
    </script>
</body>
</html>
